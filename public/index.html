<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="meter-row">
          <svg id="meter-left" class="meter" width="100" height="300">
            <rect class="meter-volume" width="90" height="145" x="5" y="150" />
            <rect class="meter-border" width="90" height="290" x="5" y="5" />
          </svg>
          <svg id="meter-center" class="meter" width="100" height="300">
            <rect class="meter-volume" width="90" height="145" x="5" y="150" />
            <rect class="meter-border" width="90" height="290" x="5" y="5" />
          </svg>
          <svg id="meter-right" class="meter" width="100" height="300">
            <rect class="meter-volume" width="90" height="145" x="5" y="150" />
            <rect class="meter-border" width="90" height="290" x="5" y="5" />
          </svg>
        </div>
        <div class="dials-top">
          <svg id="dial-top" class="dial" width="150" height="150">
            <circle class="dial-knob" cx="75" cy="75" r="60" />
            <g class="rotating-parts">
              <rect class="dial-rotor" width="5" height="20" x="70" y="20" rx="2" />
            </g>
          </svg>
        </div>
        <div class="dials-bottom">
          <svg id="dial-left" class="dial" width="150" height="150">
            <circle class="dial-knob" cx="75" cy="75" r="60" />
            <g class="rotating-parts">
              <rect class="dial-rotor" width="5" height="20" x="70" y="20" rx="2" />
            </g>
          </svg>
          <svg id="dial-right" class="dial" width="150" height="150">
            <circle class="dial-knob" cx="75" cy="75" r="60" />
            <g class="rotating-parts">
              <rect class="dial-rotor" width="5" height="20" x="70" y="20" rx="2" />
            </g>
          </svg>
        </div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "socket.io-client": "https://cdn.socket.io/4.8.3/socket.io.esm.min.js"
        }
      }
    </script>
    <script type="module" src="/client.js"></script>
  </body>
</html>
