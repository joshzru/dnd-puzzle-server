<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
      :root {
        --rosewater: #f2d5cf;
        --flamingo: #eebebe;
        --pink: #f4b8e4;
        --mauve: #ca9ee6;
        --red: #e78284;
        --maroon: #ea999c;
        --peach: #ef9f76;
        --yellow: #e6c890;
        --green: #a6d189;
        --teal: #81c8be;
        --sky: #99d1db;
        --sapphire: #85c1dc;
        --blue: #8caaee;
        --lavender: #babbf1;
        --text: #c6d0f5;
        --subtext-1: #b5bfe2;
        --subtext-0: #a5adce;
        --overlay-2: #949cbb;
        --overlay-1: #838ba7;
        --overlay-0: #737994;
        --surface-2: #626880;
        --surface-1: #51576d;
        --surface-0: #414559;
        --base: #303446;
        --mantle: #292c3c;
        --crust: #232634;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        min-height: 100svh;
        overflow-x: hidden;
        display: grid;
        place-items: center;

        background: var(--crust);
        color: var(--text);
        font-family: system-ui, sans-serif;
      }

      .login-card {
        width: min(360px, 90vw);
        background: var(--mantle);
        border: 1px solid var(--surface-1);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: var(--lavender);
        font-size: 1.6rem;
        font-weight: 600;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      input[type="password"] {
        width: 100%;
        padding: 0.9rem 1rem;
        background: var(--base);
        color: var(--text);
        border: 1px solid var(--surface-2);
        border-radius: 10px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input[type="password"]::placeholder {
        color: var(--overlay-1);
      }

      input[type="password"]:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(140, 170, 238, 0.2);
      }

      button {
        padding: 0.9rem;
        border: none;
        border-radius: 10px;
        background: var(--blue);
        color: var(--crust);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
      }

      button:hover {
        background: var(--lavender);
      }

      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Enter Password</h1>
        <form action="/login" method="post">
          <input
              type="password"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
              required
          >
          <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
